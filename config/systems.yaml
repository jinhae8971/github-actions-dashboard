    freshness_sla_hours: 30
    dependency_min_fresh: 2
    depends_on:
      - crypto-cycle-intelligence
      - ai-semi-cycle-intelligence
    dashboard_url: "https://jinhae8971.github.io/cycle-intelligence-hub/"

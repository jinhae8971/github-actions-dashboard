version: 1
owner: jinhae8971
defaults:
  expected_state: active
  freshness_sla_hours: 30

systems:
  - id: crypto-monitor
    label: Crypto Monitor
    group: core
    role: producer
    repo: crypto-monitor
    schedule_kst: "18:30 weekdays"
    telegram_policy: weekday
    freshness_sla_hours: 80
    dashboard_url: "https://jinhae8971.github.io/crypto-monitor/"
    reports:
      - key: crypto-monitor/239770946
        path: reports/latest.json

  - id: korean-stock-agent
    label: KOSPI Foreign Flow
    group: core
    role: producer
    repo: korean-stock-agent
    schedule_kst: "17:00 weekdays"
    telegram_policy: weekday
    freshness_sla_hours: 80
    dashboard_url: "https://jinhae8971.github.io/korean-stock-agent/"
    exclude_workflows:
      - .github/workflows/main.yml
    reports:
      - key: korean-stock-agent/242830429
        path: docs/data/foreign_flow.json

  - id: crypto-research-agent
    label: Daily Crypto Research
    group: global-market
    role: producer
    repo: crypto-research-agent
    schedule_kst: "06:00 daily"
    telegram_policy: saturday_0600_kst
    freshness_sla_hours: 30
    dashboard_url: "https://jinhae8971.github.io/crypto-research-agent/"
    exclude_workflows:
      - .github/workflows/daily.yml
    reports:
      - key: crypto-research-agent/latest
        path: index:docs/reports

  - id: kospi-research-agent
    label: Daily KOSPI Research
    group: global-market
    role: producer
    repo: kospi-research-agent
    schedule_kst: "06:00 daily"
    telegram_policy: saturday_0600_kst
    freshness_sla_hours: 30
    dashboard_url: "https://jinhae8971.github.io/kospi-research-agent/"
    exclude_workflows:
      - .github/workflows/daily.yml
    reports:
      - key: kospi-research-agent/latest
        path: index:docs/reports

  - id: sp500-research-agent
    label: Daily S&P 500 Research
    group: global-market
    role: producer
    repo: sp500-research-agent
    schedule_kst: "06:00 daily"
    telegram_policy: saturday_0600_kst
    freshness_sla_hours: 30
    dashboard_url: "https://jinhae8971.github.io/sp500-research-agent/"

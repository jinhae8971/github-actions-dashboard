  - id: nasdaq-research-agent
    label: Daily NASDAQ-100 Research
    group: global-market
    role: producer
    repo: nasdaq-research-agent
    schedule_kst: "06:00 daily"
    telegram_policy: saturday_0600_kst
    freshness_sla_hours: 30
    dashboard_url: "https://jinhae8971.github.io/nasdaq-research-agent/"
    exclude_workflows:
      - .github/workflows/daily.yml
    reports:
      - key: nasdaq-research-agent/latest
        path: index:docs/reports

  - id: dow30-research-agent
    label: Daily Dow 30 Research
    group: global-market
    role: producer
    repo: dow30-research-agent
    schedule_kst: "06:00 daily"
    telegram_policy: saturday_0600_kst
    freshness_sla_hours: 30
    dashboard_url: "https://jinhae8971.github.io/dow30-research-agent/"
    exclude_workflows:
      - .github/workflows/daily.yml
    reports:
      - key: dow30-research-agent/latest
        path: index:docs/reports

  - id: global-market-orchestrator
    label: Daily Global Orchestrator
    group: global-market
    role: hub
    repo: global-market-orchestrator
    schedule_kst: "07:00 daily"
    telegram_policy: daily_0700_kst
    freshness_sla_hours: 30
    dependency_min_fresh: 4
    depends_on:
      - crypto-research-agent
      - kospi-research-agent
      - sp500-research-agent
      - nasdaq-research-agent
      - dow30-research-agent
    dashboard_url: "https://jinhae8971.github.io/global-market-orchestrator/"
    exclude_workflows:
      - .github/workflows/daily.yml
    reports:

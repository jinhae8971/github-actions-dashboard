name: Orchestrator — Enforce & Update Dashboard

# 역할: 운영 대시보드 데이터 동기화
#   1. 모니터링 대상 워크플로우 상태 수집
#   2. GitHub 실제 비활성 상태를 paused.json에 반영
#   3. 최신 리포트 파일을 data/reports/로 수집

on:
  schedule:
    # 매일 07:30 KST 실행 (22:30 UTC)
    - cron: '30 22 * * *'
  workflow_dispatch:   # 수동 실행 허용

permissions:
  contents: write

groups: {}

jobs:
  orchestrate:
    name: "오케스트레이터 — 운영 대시보드 데이터 갱신"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run orchestrator
        env:
          # GH_PAT: 다른 저장소 Actions/Contents API 접근용. 없으면 현재 저장소 토큰으로 폴백.
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/orchestrator.py

      - name: Commit and push data
        run: |
          git config user.name  "orchestrator[bot]"
          git config user.email "orchestrator[bot]@users.noreply.github.com"
          git add data/workflows.json
          git add data/paused.json
          git add data/reports/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            git commit -m "chore(orchestrator): sync dashboard data ${TIMESTAMP}"
            git pull --rebase origin main
            git push
          fi

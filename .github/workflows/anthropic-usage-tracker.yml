name: Anthropic Usage Tracker

# 역할: Anthropic Admin API에서 워크플로우별 토큰/비용 데이터 수집
#   - data/daily.json (일자별 토큰/비용 추세)
#   - data/top_workflows.json (워크플로우 랭킹)
#   - data/model_breakdown.json (모델별 분해)
#   - data/summary.json (KPI 요약)

on:
  schedule:
    # 매일 07:45 KST (22:45 UTC) — 기존 orchestrator(22:30)와 15분 시간차
    - cron: '45 22 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "조회할 일수 (기본 30일)"
        required: false
        default: "30"
  push:
    paths:
      - 'anthropic-usage/scripts/fetch_usage.py'
      - 'anthropic-usage/data/key_mapping.json'
      - '.github/workflows/anthropic-usage-tracker.yml'

permissions:
  contents: write

concurrency:
  group: anthropic-usage-tracker
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    name: "Anthropic 사용량 트래커 — 데이터 갱신"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Check admin key presence
        env:
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_ADMIN_API_KEY}" ]; then
            echo "::error::ANTHROPIC_ADMIN_API_KEY secret is not set. Please add it in Repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "✓ Admin key present (length: ${#ANTHROPIC_ADMIN_API_KEY})"

      - name: Fetch usage data
        working-directory: anthropic-usage
        env:
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
        run: python scripts/fetch_usage.py

      - name: Commit data updates
        run: |
          git config user.name  "anthropic-usage[bot]"
          git config user.email "anthropic-usage[bot]@users.noreply.github.com"
          git add anthropic-usage/data/*.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            git commit -m "chore(anthropic-usage): refresh data ${TIMESTAMP}"
            git pull --rebase origin main
            git push
          fi

      - name: Job summary
        if: always()
        working-directory: anthropic-usage
        run: |
          echo "## 🤖 Anthropic Usage Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/summary.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/summary.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_summary.json not produced (check earlier logs)_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [대시보드 열기](https://jinhae8971.github.io/github-actions-dashboard/anthropic-usage/docs/)" >> $GITHUB_STEP_SUMMARY

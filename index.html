<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Actions 대시보드</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --green: #3fb950;
    --green-dim: #1a4226;
    --red: #f85149;
    --red-dim: #3d1a19;
    --yellow: #d29922;
    --yellow-dim: #3d2c0a;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cyan: #39d353;
    --accent: #238636;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* ── 헤더 ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #238636, #2ea043);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p  { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .last-updated { font-size: 12px; color: var(--text2); }
  .refresh-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 7px 16px; border-radius: 8px;
    cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px;
    transition: background .15s;
  }
  .refresh-btn:hover { background: var(--border); }
  .refresh-btn.loading svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 요약 카드 ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-card .val { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .stat-card .lbl { font-size: 12px; color: var(--text2); }
  .val.green { color: var(--green); }
  .val.red   { color: var(--red); }
  .val.blue  { color: var(--blue); }
  .val.purple{ color: var(--purple); }

  /* ── 섹션 타이틀 ── */
  .section-title {
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
  }

  /* ── 주간 캘린더 ── */
  .week-calendar {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    margin-bottom: 28px;
  }
  .timeline-header {
    display: flex; align-items: center;
    margin-bottom: 16px; gap: 10px;
  }
  .timeline-header h2 { font-size: 15px; font-weight: 600; }
  .timeline-subtitle { font-size: 12px; color: var(--text2); }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-top: 14px;
  }
  .day-col { text-align: center; }
  .day-name {
    font-size: 11px; color: var(--text2);
    margin-bottom: 8px; font-weight: 600;
    text-transform: uppercase;
  }
  .day-name.today { color: var(--blue); }
  .day-events { display: flex; flex-direction: column; gap: 4px; min-height: 40px; }
  .day-event {
    font-size: 10px; padding: 3px 6px;
    border-radius: 5px; text-align: left;
    cursor: default; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-event.daily   { background: rgba(88,166,255,.15); color: #58a6ff; border-left: 2px solid #58a6ff; }
  .day-event.weekly  { background: rgba(188,140,255,.15); color: #bc8cff; border-left: 2px solid #bc8cff; }
  .day-event.weekend { background: rgba(210,153,34,.15);  color: #d29922; border-left: 2px solid #d29922; }

  /* ── 워크플로우 카드 그리드 ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .wf-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .15s, transform .15s;
  }
  .wf-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .wf-card-header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .wf-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .wf-repo  { font-size: 11px; color: var(--blue); display: flex; align-items: center; gap: 4px; }
  .badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge.success { background: var(--green-dim); color: var(--green); }
  .badge.failure { background: var(--red-dim);   color: var(--red); }
  .badge.pending { background: var(--yellow-dim); color: var(--yellow); }
  .badge.loading { background: var(--bg3); color: var(--text2); }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge.success .dot { animation: pulse-green 2s infinite; }
  @keyframes pulse-green {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }

  .wf-card-body { padding: 14px 18px; }
  .schedule-chip {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-size: 12px; display: flex; gap: 12px;
    margin-bottom: 12px;
  }
  .schedule-chip .kst { color: var(--text); font-weight: 600; }
  .schedule-chip .cron { color: var(--text2); font-family: monospace; font-size: 11px; }

  /* 히스토리 바 */
  .history-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .history-bars  { display: flex; gap: 4px; }
  .h-bar {
    flex: 1; height: 28px; border-radius: 4px;
    position: relative; cursor: pointer;
    transition: opacity .15s;
  }
  .h-bar:hover { opacity: .75; }
  .h-bar.success { background: var(--green); }
  .h-bar.failure { background: var(--red); }
  .h-bar.skipped { background: var(--bg3); border: 1px solid var(--border); }
  .h-bar.loading { background: var(--border); animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%,100% { opacity:.4; } 50% { opacity:1; } }
  .h-bar .tooltip {
    display: none;
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 8px; border-radius: 6px; white-space: nowrap;
    font-size: 11px; z-index: 10;
  }
  .h-bar:hover .tooltip { display: block; }

  .wf-card-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .run-link {
    font-size: 11px; color: var(--blue);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
  }
  .run-link:hover { text-decoration: underline; }
  .run-ago { font-size: 11px; color: var(--text2); }

  /* ── 최근 리포트 버튼 ── */
  .report-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--blue); padding: 5px 12px; border-radius: 8px;
    cursor: pointer; font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .report-btn:hover { background: #1c2a3a; border-color: var(--blue); }
  .report-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── 리포트 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    z-index: 2000; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .report-modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 780px;
    max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    animation: slideUp .2s ease;
  }
  .modal-header {
    padding: 18px 22px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .modal-header-left { display: flex; flex-direction: column; gap: 4px; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-meta  { font-size: 11px; color: var(--text2); display: flex; gap: 14px; }
  .modal-close {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body {
    padding: 20px 22px; overflow-y: auto; flex: 1;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .report-content {
    font-size: 13px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
    color: var(--text); font-family: 'Noto Sans KR', -apple-system, sans-serif;
  }
  .report-content b  { font-weight: 700; }
  .report-content a  { color: var(--blue); text-decoration: none; }
  .report-content a:hover { text-decoration: underline; }
  .report-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .modal-empty {
    text-align: center; padding: 48px 0;
    color: var(--text2); font-size: 13px; line-height: 2;
  }
  .modal-loading {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 48px 0; color: var(--text2); font-size: 13px;
  }
  .spin-ring {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--blue);
    animation: spin .8s linear infinite;
  }

  /* ── 스켈레톤 ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: skel 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes skel { 0%{background-position:200%}100%{background-position:-200%} }
  .empty { text-align: center; padding: 60px; color: var(--text2); font-size: 14px; }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; z-index: 1000;
    display: none; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { display: flex; animation: slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  footer {
    text-align: center; color: var(--text2); font-size: 11px;
    margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--border);
  }

  /* ── 모바일 반응형 ────────────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    body { padding: 16px 12px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }

    /* 헤더: 2줄로 쌓기 */
    .header {
      flex-wrap: wrap; gap: 10px;
      margin-bottom: 20px; padding-bottom: 16px;
    }
    .header h1 { font-size: 17px; }
    .header p  { font-size: 11px; }
    .header-right { width: 100%; justify-content: space-between; }
    .last-updated { font-size: 11px; }
    .refresh-btn  { padding: 8px 14px; font-size: 12px; min-height: 36px; }

    /* 요약 카드: 2×2 그리드 */
    .summary {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    .stat-card { padding: 14px 16px; }
    .stat-card .val { font-size: 24px; }
    .stat-card .lbl { font-size: 11px; }

    /* 주간 캘린더: 가로 스크롤 */
    .week-calendar { padding: 14px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .week-grid { min-width: 460px; gap: 5px; }
    .day-name  { font-size: 10px; margin-bottom: 6px; }
    .day-event { font-size: 9px; padding: 2px 4px; }

    /* 워크플로우 카드: 1열 풀 너비 */
    .cards-grid { grid-template-columns: 1fr; gap: 12px; }
    .wf-card:hover { transform: none; } /* 모바일에선 hover 효과 제거 */
    .wf-card-header { padding: 12px 14px 10px; }
    .wf-title { font-size: 13px; }
    .wf-card-body   { padding: 12px 14px; }

    /* 스케줄 칩: cron 아래 줄 바꿈 */
    .schedule-chip { flex-wrap: wrap; gap: 4px 10px; padding: 8px 10px; }
    .schedule-chip .cron { width: 100%; margin-top: 2px; }

    /* 히스토리 바: 터치 툴팁 숨김 */
    .h-bar .tooltip { display: none !important; }
    .h-bar { height: 24px; border-radius: 3px; }

    /* 카드 푸터: 세로 배치 */
    .wf-card-footer {
      padding: 10px 14px;
      flex-direction: column; align-items: stretch; gap: 8px;
    }
    .wf-card-footer > div { justify-content: space-between; }
    .run-link   { font-size: 12px; min-height: 32px; align-items: center; }
    .report-btn { justify-content: center; min-height: 34px; }

    /* 모달: 하단 시트 스타일 */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .report-modal  {
      border-radius: 16px 16px 0 0; max-height: 90vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .modal-header { padding: 16px 18px 14px; }
    .modal-title  { font-size: 14px; }
    .modal-body   { padding: 16px 18px; }
    .modal-close  { width: 34px; height: 34px; font-size: 18px; }

    /* 토스트: 하단 중앙 */
    .toast { left: 12px; right: 12px; bottom: 16px; font-size: 12px; }

    /* 섹션 타이틀 */
    .section-title { font-size: 10px; }

    footer { font-size: 10px; margin-top: 24px; }
  }

  @media (max-width: 380px) {
    body { padding: 12px 10px; }
    .header h1 { font-size: 15px; }
    .stat-card .val { font-size: 20px; }
    .summary { gap: 8px; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="logo">⚙️</div>
    <div>
      <h1>GitHub Actions 대시보드</h1>
      <p>jinhae8971 · 자동화 워크플로우 모니터</p>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
      <svg id="refreshIcon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
      </svg>
      새로고침
    </button>
  </div>
</div>

<!-- 요약 통계 -->
<div class="summary" id="summaryCards">
  <div class="stat-card"><div class="val blue skeleton" style="height:28px;width:40px">&nbsp;</div><div class="lbl">전체 워크플로우</div></div>
  <div class="stat-card"><div class="val green skeleton" style="height:28px;width:40px">&nbsp;</div><div class="lbl">성공</div></div>
  <div class="stat-card"><div class="val red skeleton" style="height:28px;width:40px">&nbsp;</div><div class="lbl">실패</div></div>
  <div class="stat-card"><div class="val purple skeleton" style="height:28px;width:40px">&nbsp;</div><div class="lbl">오늘 실행 예정</div></div>
</div>

<!-- 주간 스케줄 캘린더 -->
<div class="section-title">📅 주간 실행 스케줄</div>
<div class="week-calendar" id="weekCalendar">
  <div style="color:var(--text2);font-size:13px">로딩 중...</div>
</div>

<!-- 워크플로우 카드 -->
<div class="section-title">🔧 워크플로우 상세</div>
<div class="cards-grid" id="cardsGrid">
  <div class="wf-card" style="padding:20px">
    <div class="skeleton" style="height:16px;width:60%;margin-bottom:10px"></div>
    <div class="skeleton" style="height:12px;width:40%;margin-bottom:20px"></div>
    <div class="skeleton" style="height:32px;width:100%"></div>
  </div>
  <div class="wf-card" style="padding:20px">
    <div class="skeleton" style="height:16px;width:60%;margin-bottom:10px"></div>
    <div class="skeleton" style="height:12px;width:40%;margin-bottom:20px"></div>
    <div class="skeleton" style="height:32px;width:100%"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<!-- 리포트 모달 -->
<div class="modal-overlay" id="reportModal" onclick="handleModalClick(event)">
  <div class="report-modal" id="reportModalBox">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-title" id="modalTitle">최근 리포트</div>
        <div class="modal-meta">
          <span id="modalTimestamp">—</span>
          <span id="modalRepo" style="color:var(--blue)">—</span>
        </div>
      </div>
      <button class="modal-close" onclick="closeReportModal()" title="닫기">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-loading">
        <div class="spin-ring"></div>
        <span>리포트 불러오는 중...</span>
      </div>
    </div>
  </div>
</div>

<footer>
  GitHub Actions Dashboard · jinhae8971 · 매시간 자동 갱신
</footer>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────────────
// 리포트 파일 경로 (GitHub Actions가 data/reports/ 에 저장한 정적 파일)
// 워크플로우 ID는 data/workflows.json을 확인 후 업데이트하세요
const REPORT_FILE_MAP = {
  '236541757': './data/reports/korean-market-bot_236541757.json',
  '236553677': './data/reports/korean-market-bot_236553677.json',
  '237174445': './data/reports/competitor-ai-tracker_237174445.json',
  '236856279': './data/reports/lgd-news-monitor_236856279.json',
  '236850987': './data/reports/livebench-notify_236850987.json',
  '236632933': './data/reports/dart-weekly-report_236632933.json',
  '236642604': './data/reports/memory-price-tracker_236642604.json',
  '236653953': './data/reports/realestate-permit-tracker_236653953.json',
};

// ── 유틸리티 ─────────────────────────────────────────────────────────────────
function parseCron(cron) {
  const parts = cron.trim().split(/\s+/);
  if (parts.length < 5) return { kst: cron, type: 'unknown', days: [] };
  const [min, hour, , , dow] = parts;

  const utcH = parseInt(hour), utcM = parseInt(min);
  const kstH = (utcH + 9) % 24;
  const crossDay = (utcH + 9) >= 24;
  const timeStr = `${String(kstH).padStart(2,'0')}:${String(utcM).padStart(2,'0')}`;

  const DAY_KR = ['일','월','화','수','목','금','토'];
  let scheduleKst = '', type = 'unknown', activeDays = [];

  if (dow === '*') {
    scheduleKst = `매일 ${timeStr} KST`;
    type = 'daily';
    activeDays = [0,1,2,3,4,5,6];
  } else {
    const parseRange = s => {
      const days = [];
      s.split(',').forEach(p => {
        if (p.includes('-')) {
          const [a,b] = p.split('-').map(Number);
          for (let i=a; i<=b; i++) days.push(i);
        } else days.push(Number(p));
      });
      return days;
    };
    const utcDays = parseRange(dow);
    activeDays = crossDay ? utcDays.map(d => (d+1)%7) : utcDays;

    if (activeDays.length === 5 && !activeDays.includes(0) && !activeDays.includes(6)) {
      scheduleKst = `평일 ${timeStr} KST`; type = 'weekday';
    } else if (activeDays.length === 1 && activeDays[0] === 6) {
      scheduleKst = `매주 토요일 ${timeStr} KST`; type = 'weekly';
    } else if (activeDays.length === 1 && activeDays[0] === 0) {
      scheduleKst = `매주 일요일 ${timeStr} KST`; type = 'weekly';
    } else {
      scheduleKst = `${activeDays.map(d=>DAY_KR[d]).join('·')} ${timeStr} KST`; type = 'custom';
    }
  }
  return { kst: scheduleKst, type, activeDays, timeStr };
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)    return '방금 전';
  if (diff < 3600)  return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  return `${Math.floor(diff/86400)}일 전`;
}

// ── 데이터 로드 (정적 JSON 파일) ──────────────────────────────────────────────
let allWorkflows = [];

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');

  try {
    // 캐시 방지를 위해 타임스탬프 쿼리 파라미터 추가
    const resp = await fetch('./data/workflows.json?_=' + Date.now());
    if (!resp.ok) throw new Error(`데이터 파일을 불러올 수 없습니다 (HTTP ${resp.status})`);
    const data = await resp.json();

    allWorkflows = data.workflows || [];
    renderSummary(allWorkflows);
    renderWeekCalendar(allWorkflows);
    renderCards(allWorkflows);

    // 파일의 updated_at 기준으로 갱신 시각 표시
    const updatedKST = new Date(data.updated_at).toLocaleString('ko-KR', {
      timeZone: 'Asia/Seoul',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
    document.getElementById('lastUpdated').textContent = `마지막 갱신: ${updatedKST} KST`;
    toast('✅ 데이터 갱신 완료');

  } catch(e) {
    // 데이터 파일이 아직 없는 경우 안내 메시지
    document.getElementById('cardsGrid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div style="font-size:32px;margin-bottom:12px">⚙️</div>
        <div style="font-size:14px;margin-bottom:8px">데이터를 불러오는 중이에요</div>
        <div style="font-size:12px;color:var(--text2)">
          GitHub Actions가 처음 실행되면 자동으로 데이터가 생성됩니다.<br>
          잠시 후 새로고침해 주세요.
        </div>
      </div>`;
    document.getElementById('summaryCards').innerHTML = `
      <div class="stat-card"><div class="val blue">—</div><div class="lbl">전체 워크플로우</div></div>
      <div class="stat-card"><div class="val green">—</div><div class="lbl">최근 성공</div></div>
      <div class="stat-card"><div class="val red">—</div><div class="lbl">최근 실패</div></div>
      <div class="stat-card"><div class="val purple">—</div><div class="lbl">오늘 실행 예정</div></div>`;
    toast('⚠️ ' + e.message, true);
    console.warn(e);
  } finally {
    btn.classList.remove('loading');
  }
}

// ── 렌더링 함수들 ─────────────────────────────────────────────────────────────
function renderSummary(wfData) {
  const total        = wfData.length;
  const successCount = wfData.filter(d => d.runs[0]?.conclusion === 'success').length;
  const failCount    = wfData.filter(d => d.runs[0]?.conclusion === 'failure').length;

  const nowKST  = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayDow = nowKST.getDay();
  const todayRun = wfData.filter(d => {
    if (!d.cron) return false;
    return parseCron(d.cron).activeDays.includes(todayDow);
  }).length;

  document.getElementById('summaryCards').innerHTML = `
    <div class="stat-card"><div class="val blue">${total}</div><div class="lbl">전체 워크플로우</div></div>
    <div class="stat-card"><div class="val green">${successCount}</div><div class="lbl">최근 성공</div></div>
    <div class="stat-card"><div class="val ${failCount>0?'red':'green'}">${failCount}</div><div class="lbl">최근 실패</div></div>
    <div class="stat-card"><div class="val purple">${todayRun}</div><div class="lbl">오늘 실행 예정</div></div>
  `;
}

function renderWeekCalendar(wfData) {
  const DAY_KR  = ['일','월','화','수','목','금','토'];
  const nowKST  = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayDow = nowKST.getDay();
  const dayEvents = Array.from({length:7}, () => []);

  wfData.forEach(({wf, cron}) => {
    if (!cron) return;
    const { activeDays, timeStr, type } = parseCron(cron);
    activeDays.forEach(d => {
      const cls = type==='daily' ? 'daily' : (d===0||d===6) ? 'weekend' : 'weekly';
      dayEvents[d].push({ label: wf.name.replace(/^[^\w가-힣]+/,'').substring(0,14), time: timeStr, cls });
    });
  });

  document.getElementById('weekCalendar').innerHTML = `
    <div class="timeline-header">
      <h2>📅 주간 실행 캘린더</h2>
      <span class="timeline-subtitle">KST 기준</span>
    </div>
    <div class="week-grid">
      ${DAY_KR.map((day, i) => `
        <div class="day-col">
          <div class="day-name ${i===todayDow?'today':''}">${day}${i===todayDow?' ●':''}</div>
          <div class="day-events">
            ${dayEvents[i].map(ev => `
              <div class="day-event ${ev.cls}">${ev.time}<br>${ev.label}</div>
            `).join('') || '<div style="font-size:10px;color:var(--border);padding:4px 0">—</div>'}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderCards(wfData) {
  if (!wfData.length) {
    document.getElementById('cardsGrid').innerHTML = '<div class="empty">워크플로우 없음</div>';
    return;
  }

  const REPO_ICONS = {
    'korean-market-bot':         '📊',
    'dart-weekly-report':        '🗂',
    'lgd-news-monitor':          '📰',
    'livebench-notify':          '🏆',
    'memory-price-tracker':      '💾',
    'realestate-permit-tracker': '🏗',
  };

  const cards = wfData.map(({ repo, wf, cron, runs }) => {
    const last = runs[0];
    const conclusion = last?.conclusion || (last?.status === 'in_progress' ? 'running' : 'pending');
    const badgeMap = {
      success:   '<span class="badge success"><span class="dot"></span>성공</span>',
      failure:   '<span class="badge failure"><span class="dot"></span>실패</span>',
      running:   '<span class="badge pending"><span class="dot"></span>실행 중</span>',
      pending:   '<span class="badge loading">대기 중</span>',
      cancelled: '<span class="badge loading">취소됨</span>',
    };
    const badge    = badgeMap[conclusion] || `<span class="badge loading">${conclusion}</span>`;
    const schedule = cron ? parseCron(cron) : null;
    const icon     = REPO_ICONS[repo] || '⚙️';
    const runUrl   = last?.html_url || `https://github.com/jinhae8971/${repo}/actions`;

    const historyBars = Array.from({length:7}, (_,i) => {
      const run = runs[6-i];
      if (!run) return `<div class="h-bar skipped"><div class="tooltip">기록 없음</div></div>`;
      const c  = run.conclusion || run.status;
      const dt = new Date(run.created_at).toLocaleString('ko-KR',{
        timeZone:'Asia/Seoul', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
      });
      return `<div class="h-bar ${c}"><div class="tooltip">#${run.run_number} ${c}<br>${dt}</div></div>`;
    }).join('');

    // 리포트 버튼: REPORT_FILE_MAP에 있는 워크플로우만 표시
    const hasReport = REPORT_FILE_MAP[String(wf.id)];
    const reportBtn = hasReport ? `
      <button class="report-btn" id="rbtn-${repo}-${wf.id}"
        onclick="openReport('${repo}','${wf.id}','${wf.name.replace(/'/g,"\\'")}')">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
          <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/>
        </svg>
        최근 리포트
      </button>` : '';

    return `
      <div class="wf-card">
        <div class="wf-card-header">
          <div>
            <div class="wf-title">${icon} ${wf.name}</div>
            <div class="wf-repo">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8V1.5Z"/>
              </svg>
              ${repo}
            </div>
          </div>
          ${badge}
        </div>
        <div class="wf-card-body">
          ${schedule ? `
            <div class="schedule-chip">
              <span>🕐</span>
              <span class="kst">${schedule.kst}</span>
              <span class="cron">${cron}</span>
            </div>` : ''}
          <div class="history-label">최근 7회 실행 히스토리</div>
          <div class="history-bars">${historyBars}</div>
        </div>
        <div class="wf-card-footer">
          <a class="run-link" href="${runUrl}" target="_blank">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Actions 보기
          </a>
          <div style="display:flex;align-items:center;gap:10px">
            ${reportBtn}
            <span class="run-ago">마지막: ${last ? timeAgo(last.created_at) : '—'}</span>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('cardsGrid').innerHTML = cards.join('');
}

// ── 리포트 모달 (정적 파일 기반) ─────────────────────────────────────────────
async function openReport(repo, wfId, wfName) {
  const modal = document.getElementById('reportModal');
  const body  = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent = wfName;
  document.getElementById('modalRepo').textContent  = repo;
  document.getElementById('modalTimestamp').textContent = '불러오는 중...';
  body.innerHTML = `<div class="modal-loading"><div class="spin-ring"></div><span>리포트 불러오는 중...</span></div>`;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  const btn = document.getElementById(`rbtn-${repo}-${wfId}`);
  if (btn) btn.disabled = true;

  const reportFile = REPORT_FILE_MAP[String(wfId)];

  try {
    const resp = await fetch(reportFile + '?_=' + Date.now());
    if (resp.status === 404) {
      body.innerHTML = `
        <div class="modal-empty">
          📭 아직 저장된 리포트가 없습니다.<br>
          <span style="font-size:12px;color:var(--text2)">워크플로우가 다음에 실행되면 자동으로 저장됩니다.</span>
        </div>`;
      document.getElementById('modalTimestamp').textContent = '데이터 없음';
      return;
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const decoded = await resp.json();
    const kstTs   = decoded.timestamp
      ? new Date(decoded.timestamp).toLocaleString('ko-KR', {
          timeZone: 'Asia/Seoul',
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        }) + ' KST'
      : '—';
    document.getElementById('modalTimestamp').textContent = kstTs;

    const safe = (decoded.content || '')
      .replace(/&(?!amp;|lt;|gt;|quot;|#)/g, '&amp;')
      .replace(/<(?!\/?(?:b|i|a|code|pre|br|hr)\b)/gi, '&lt;');
    body.innerHTML = `<div class="report-content">${safe}</div>`;

  } catch(err) {
    body.innerHTML = `
      <div class="modal-empty">
        ❌ 리포트를 불러올 수 없습니다.<br>
        <span style="font-size:12px;color:var(--text2)">${err.message}</span>
      </div>`;
    document.getElementById('modalTimestamp').textContent = '오류';
  } finally {
    if (btn) btn.disabled = false;
  }
}

function closeReportModal() {
  document.getElementById('reportModal').classList.remove('open');
  document.body.style.overflow = '';
}
function handleModalClick(e) {
  if (e.target === document.getElementById('reportModal')) closeReportModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReportModal(); });

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.style.borderColor = isErr ? 'var(--red)' : 'var(--green)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// 초기 로드 + 5분마다 자동 갱신
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
